<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu Categories - David Chu's China Bistro</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link href='https://fonts.googleapis.com/css?family=Oxygen:400,300,700' rel='stylesheet' type='text/css'>
    <link href='https://fonts.googleapis.com/css?family=Lora' rel='stylesheet' type='text/css'>
    <style>
        body {
            font-size: 16px;
            color: #fff;
            background-color: #61122f;
            font-family: 'Oxygen', sans-serif;
        }
        #header-nav {
            background-color: #f6b319;
            border-radius: 0;
            border: 0;
        }
        .navbar-brand h1 {
            font-family: 'Lora', serif;
            color: #557c3e;
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 0;
            line-height: .75;
        }
        .container {
            background-color: #fff;
            color: #000;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }
        .category-tile {
            background-color: #f6b319;
            margin: 10px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .category-tile:hover {
            transform: scale(1.05);
        }
        .category-tile a {
            color: #61122f;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
        }
        .back-btn {
            margin-bottom: 20px;
        }
        footer {
            background-color: #222;
            color: #fff;
            margin-top: 20px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <nav id="header-nav" class="navbar navbar-default">
            <div class="container-fluid">
                <div class="navbar-header">
                    <div class="navbar-brand">
                        <a href="index.html"><h1>David Chu's China Bistro</h1></a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="container">
        <a href="index.html" class="btn btn-primary back-btn">← Back to Home</a>
        <h1 class="text-center">Menu Categories</h1>
        <div id="categories-list" class="row"></div>
    </div>

    <footer>
        &copy; Copyright David Chu's China Bistro 2016
    </footer>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script>
        // Загружаем список категорий
        $.getJSON("https://coursera-jhu-default-rtdb.firebaseio.com/categories.json", function(categories) {
            var html = "";
            categories.forEach(function(category) {
                if (category && category.short_name && category.name) {
                    html += '<div class="col-md-4 col-sm-6 col-xs-12">';
                    html += '<div class="category-tile">';
                    html += '<a href="menu-items.html?category=' + category.short_name + '">';
                    html += '<h3>' + category.name + '</h3>';
                    html += '<p>' + (category.special_instructions || 'Click to view menu items') + '</p>';
                    html += '</a>';
                    html += '</div>';
                    html += '</div>';
                }
            });
            $("#categories-list").html(html);
        }).fail(function() {
            $("#categories-list").html('<p class="text-center text-danger">Failed to load categories. Please try again later.</p>');
        });
    </script>
</body>
</html>
